<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTrack Report</title>
</head>
<body>
    <div id="app">
        <header>
            <h1>TimeTrack Report</h1>
            <div class="range-picker">
                <button class="range-preset active" data-preset="today">今天</button>
                <button class="range-preset" data-preset="thisWeek">本周</button>
                <button class="range-preset" data-preset="thisMonth">本月</button>
                <button class="range-preset" data-preset="last7">近 7 天</button>
                <button class="range-preset" data-preset="last30">近 30 天</button>
                <button class="range-preset" data-preset="custom">自定义</button>
            </div>
            <div class="custom-range" id="customRange" hidden>
                <input type="date" id="rangeStart" />
                <span class="range-sep">—</span>
                <input type="date" id="rangeEnd" />
            </div>
        </header>
        <section class="summary-cards">
            <div class="card">
                <span class="card-label">Total Time</span>
                <span class="card-value" id="totalTime">--</span>
            </div>
            <div class="card">
                <span class="card-label">Files</span>
                <span class="card-value" id="fileCount">--</span>
            </div>
            <div class="card">
                <span class="card-label">Lines Changed</span>
                <span class="card-value" id="linesChanged">--</span>
            </div>
        </section>
        <section class="charts">
            <div class="chart-container">
                <h2>By Day</h2>
                <canvas id="overviewChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Top Files</h2>
                <canvas id="filesChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Hour of Day</h2>
                <canvas id="timelineChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Line Changes</h2>
                <canvas id="lineChangesChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Projects</h2>
                <canvas id="projectsChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Languages</h2>
                <canvas id="languagesChart"></canvas>
            </div>
        </section>
    </div>
</body>
</html>
